<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagePulse - Cloud Reading Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-admin { display: none !important; }
        
        /* Goal Reached Animation */
        .goal-pulse { animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-20">

    <nav class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="book-open"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-800">PagePulse</h1>
            </div>
            <div class="flex bg-gray-100 p-1 rounded-xl items-center">
                <button onclick="switchView('leaderboard')" id="nav-leaderboard" class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-white shadow-sm text-blue-600">Leaderboard</button>
                <button onclick="switchView('log')" id="nav-log" class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700">Add Reading</button>
                <button onclick="switchView('admin')" id="nav-admin" class="hidden-admin px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700">Students</button>
                <div class="w-[1px] h-4 bg-gray-300 mx-2"></div>
                <button onclick="toggleTeacherMode()" id="teacher-lock-btn" class="p-1.5 rounded-lg text-gray-400 hover:text-blue-600 transition-all">
                    <i data-lucide="lock" id="lock-icon" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <!-- Loading State -->
        <div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center transition-opacity duration-500">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-gray-500 font-medium">Connecting to Cloud...</p>
        </div>

        <div id="notification" class="hidden fixed top-20 right-4 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl z-50 flex items-center gap-3 border border-white/10">
            <div class="bg-green-500 rounded-full p-1"><i data-lucide="trending-up" class="w-4 h-4"></i></div>
            <span id="notification-text"></span>
        </div>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="bg-blue-100 text-blue-600 p-3 rounded-xl"><i data-lucide="users"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Total Students</p>
                    <p id="stat-total-students" class="text-2xl font-bold">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="bg-purple-100 text-purple-600 p-3 rounded-xl"><i data-lucide="book-open"></i></div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Class Pages Read</p>
                    <p id="stat-total-pages" class="text-2xl font-bold">0</p>
                </div>
            </div>
            <div id="goal-card" class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4 transition-all duration-500">
                <div id="goal-icon-bg" class="bg-amber-100 text-amber-600 p-3 rounded-xl"><i data-lucide="award"></i></div>
                <div class="flex-1">
                    <p id="goal-label" class="text-sm text-gray-500 font-medium">Class Goal (3k)</p>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="flex-1 h-3 bg-gray-100 rounded-full overflow-hidden">
                            <div id="goal-progress-bar" class="h-full bg-amber-400 transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <span id="goal-percent" class="text-xs font-bold text-amber-600">0%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Leaderboard View -->
        <div id="view-leaderboard" class="animate-in flex flex-col lg:flex-row gap-6">
            <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-4 bg-gradient-to-r from-blue-500 to-indigo-600 text-white flex items-center justify-between">
                    <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="trophy"></i> Boys' Rankings</h2>
                </div>
                <div id="list-boys" class="p-2 min-h-[100px]"></div>
            </div>
            <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-4 bg-gradient-to-r from-pink-500 to-rose-600 text-white flex items-center justify-between">
                    <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="trophy"></i> Girls' Rankings</h2>
                </div>
                <div id="list-girls" class="p-2 min-h-[100px]"></div>
            </div>
        </div>

        <!-- Log Reading View -->
        <div id="view-log" class="hidden animate-in max-w-md mx-auto">
            <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-xl">
                <div class="text-center mb-6">
                    <div class="inline-flex bg-blue-50 p-3 rounded-2xl text-blue-600 mb-3"><i data-lucide="plus-circle" class="w-8 h-8"></i></div>
                    <h2 class="text-2xl font-bold text-slate-800">Add Pages Read</h2>
                </div>
                <form onsubmit="handleLogPages(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Select Your Name</label>
                        <select id="log-student-select" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required></select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">How many pages?</label>
                        <input id="log-pages-input" type="number" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                    </div>
                    <button type="submit" id="log-submit-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all">
                        Save Progress
                    </button>
                </form>
            </div>
        </div>

        <!-- Teacher Admin View -->
        <div id="view-admin" class="hidden animate-in grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="user-plus"></i> New Student</h2>
                    <form onsubmit="handleAddStudent(event)" class="space-y-4">
                        <input id="new-student-name" type="text" placeholder="Student Name" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                        <div class="flex gap-2">
                            <button type="button" onclick="setGender('Boy')" id="gender-boy" class="flex-1 py-2 rounded-xl text-sm font-bold border bg-slate-800 text-white border-slate-800">Boy</button>
                            <button type="button" onclick="setGender('Girl')" id="gender-girl" class="flex-1 py-2 rounded-xl text-sm font-bold border bg-white text-gray-500 border-gray-200">Girl</button>
                        </div>
                        <button type="submit" id="add-student-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Add Student</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-red-100 shadow-sm bg-red-50/30">
                    <h2 class="text-lg font-bold mb-2 text-red-700 flex items-center gap-2"><i data-lucide="rotate-ccw"></i> Reset Center</h2>
                    <p class="text-xs text-red-500 mb-4 leading-relaxed">This will reset all page counts to zero. Student names will be preserved.</p>
                    <button onclick="resetAllPages()" id="reset-pages-btn" class="w-full bg-white border border-red-200 text-red-600 py-3 rounded-xl font-bold hover:bg-red-600 hover:text-white transition-all shadow-sm">
                        Reset All Pages
                    </button>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="p-4 border-b bg-gray-50/50 flex justify-between items-center">
                        <h2 class="font-bold">Manage Class</h2>
                        <span id="admin-count-badge" class="text-xs text-gray-500">0 Total</span>
                    </div>
                    <div id="admin-student-list" class="divide-y divide-gray-100 max-h-[500px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Password Modal -->
    <div id="password-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold text-center mb-4">Teacher Access</h3>
            <input type="password" id="admin-password" placeholder="Password" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl mb-4 text-center">
            <div class="flex gap-3">
                <button onclick="closePasswordModal()" class="flex-1 py-3 text-gray-500">Cancel</button>
                <button onclick="verifyPassword()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl">Unlock</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, onSnapshot, query, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. PASTE YOUR CONFIG FROM FIREBASE BELOW:
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyD_hRsVFoGuN-kwewcGFmkw8M3ybICwSrk",
          authDomain: "reading-tracker-72282.firebaseapp.com",
          projectId: "reading-tracker-72282",
          storageBucket: "reading-tracker-72282.firebasestorage.app",
          messagingSenderId: "11384559054",
          appId: "1:11384559054:web:d2ccaddba36a1fed5a879f",
          measurementId: "G-S3NW4TM7DN"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global state
        let students = [];
        let isTeacherMode = false;
        let currentGenderSelection = 'Boy';
        let goalReachedNotificationShown = false;
        const CLASS_GOAL = 3000;
        const TEACHER_PASSWORD = "1234";

        // Start Auth & Data Listeners
        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        setupRealtimeSync();
                    }
                });
            } catch (err) {
                console.error("Auth failed:", err);
            }
        }

        function setupRealtimeSync() {
            const studentsRef = collection(db, 'students');
            
            onSnapshot(studentsRef, (snapshot) => {
                students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
                hideLoader();
            }, (error) => {
                console.error("Sync error:", error);
            });
        }

        function hideLoader() {
            const loader = document.getElementById('loading-overlay');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.classList.add('hidden'), 500);
            }
        }

        // CRUD Operations
        window.handleAddStudent = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('add-student-btn');
            const nameInput = document.getElementById('new-student-name');
            const name = nameInput.value.trim();
            if (!name) return;

            btn.disabled = true;
            try {
                const id = Date.now().toString();
                await setDoc(doc(db, 'students', id), {
                    name: name,
                    gender: currentGenderSelection,
                    total: 0,
                    logs: []
                });
                nameInput.value = '';
                showNotification(`Added ${name}!`);
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        };

        window.handleLogPages = async function(e) {
            e.preventDefault();
            const id = document.getElementById('log-student-select').value;
            const pagesInput = document.getElementById('log-pages-input');
            const pages = parseInt(pagesInput.value);
            if (!id || isNaN(pages)) return;

            const btn = document.getElementById('log-submit-btn');
            btn.disabled = true;

            try {
                const student = students.find(s => s.id === id);
                const studentRef = doc(db, 'students', id);
                
                await updateDoc(studentRef, {
                    total: (student.total || 0) + pages,
                    logs: arrayUnion({ date: new Date().toISOString(), pages: pages })
                });

                pagesInput.value = '';
                showNotification(`Logged ${pages} pages!`);
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        };

        window.deleteStudent = async function(id) {
            if (!isTeacherMode) return;
            if (confirm("Delete this student permanently from the cloud?")) {
                await deleteDoc(doc(db, 'students', id));
                showNotification("Student removed.");
            }
        };

        window.resetAllPages = async function() {
            if (!isTeacherMode) return;
            const confirmMsg = "Are you sure you want to reset ALL pages to zero? \n\n(Student names will remain, but all progress will be lost.)";
            if (confirm(confirmMsg)) {
                const btn = document.getElementById('reset-pages-btn');
                btn.innerText = "Resetting...";
                btn.disabled = true;

                try {
                    // Loop through and update each student
                    const resetPromises = students.map(s => {
                        const studentRef = doc(db, 'students', s.id);
                        return updateDoc(studentRef, {
                            total: 0,
                            logs: []
                        });
                    });

                    await Promise.all(resetPromises);
                    showNotification("All pages reset to 0.");
                    goalReachedNotificationShown = false; // Allow confetti to trigger again next time goal reached
                } catch (err) {
                    console.error("Reset failed:", err);
                    alert("Error resetting pages. Check your connection.");
                } finally {
                    btn.innerText = "Reset All Pages";
                    btn.disabled = false;
                }
            }
        };

        // UI Logic
        window.switchView = function(viewName) {
            if (viewName === 'admin' && !isTeacherMode) return;
            ['leaderboard', 'log', 'admin'].forEach(v => {
                const view = document.getElementById(`view-${v}`);
                if (view) view.classList.add('hidden');
                const nav = document.getElementById(`nav-${v}`);
                if(nav) nav.className = "px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700";
            });
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            const activeNav = document.getElementById(`nav-${viewName}`);
            if (activeNav) activeNav.className = "px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-white shadow-sm text-blue-600";
        };

        window.toggleTeacherMode = function() {
            if (isTeacherMode) {
                isTeacherMode = false;
                switchView('leaderboard');
                updateTeacherUI();
            } else {
                document.getElementById('password-modal').classList.remove('hidden');
            }
        };

        window.closePasswordModal = function() {
            document.getElementById('password-modal').classList.add('hidden');
        };

        window.verifyPassword = function() {
            const passInput = document.getElementById('admin-password');
            if (passInput.value === TEACHER_PASSWORD) {
                isTeacherMode = true;
                updateTeacherUI();
                closePasswordModal();
                switchView('admin');
            } else {
                alert("Incorrect Password");
            }
            passInput.value = '';
        };

        function updateTeacherUI() {
            const adminNav = document.getElementById('nav-admin');
            const lockIcon = document.getElementById('lock-icon');
            if (isTeacherMode) {
                adminNav.classList.remove('hidden-admin');
                lockIcon.setAttribute('data-lucide', 'unlock');
            } else {
                adminNav.classList.add('hidden-admin');
                lockIcon.setAttribute('data-lucide', 'lock');
            }
            lucide.createIcons();
            renderAll();
        }

        window.setGender = function(g) {
            currentGenderSelection = g;
            document.getElementById('gender-boy').className = g === 'Boy' ? 'flex-1 py-2 rounded-xl text-sm font-bold border bg-slate-800 text-white' : 'flex-1 py-2 rounded-xl text-sm font-bold border bg-white text-gray-500';
            document.getElementById('gender-girl').className = g === 'Girl' ? 'flex-1 py-2 rounded-xl text-sm font-bold border bg-slate-800 text-white' : 'flex-1 py-2 rounded-xl text-sm font-bold border bg-white text-gray-500';
        };

        function triggerConfetti() {
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
              const timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              const particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function renderAll() {
            const totalPages = students.reduce((sum, s) => sum + (s.total || 0), 0);
            const progressPercent = Math.min((totalPages / CLASS_GOAL) * 100, 100);
            
            document.getElementById('stat-total-students').innerText = students.length;
            document.getElementById('stat-total-pages').innerText = totalPages.toLocaleString();
            
            // Update Goal Bar
            const bar = document.getElementById('goal-progress-bar');
            const percentLabel = document.getElementById('goal-percent');
            const goalCard = document.getElementById('goal-card');
            const goalIcon = document.getElementById('goal-icon-bg');
            
            bar.style.width = progressPercent + '%';
            percentLabel.innerText = Math.floor(progressPercent) + '%';

            // Check if goal reached
            if (totalPages >= CLASS_GOAL) {
                goalCard.classList.add('goal-pulse', 'border-amber-200', 'bg-amber-50');
                goalIcon.classList.remove('bg-amber-100');
                goalIcon.classList.add('bg-amber-500', 'text-white');
                
                if (!goalReachedNotificationShown) {
                    triggerConfetti();
                    showNotification("GOAL REACHED! 🏆🥳");
                    goalReachedNotificationShown = true;
                }
            } else {
                // Remove visual feedback if below goal (e.g. after reset)
                goalCard.classList.remove('goal-pulse', 'border-amber-200', 'bg-amber-50');
                goalIcon.classList.add('bg-amber-100');
                goalIcon.classList.remove('bg-amber-500', 'text-white');
            }

            renderLeaderboard('list-boys', students.filter(s => s.gender === 'Boy'));
            renderLeaderboard('list-girls', students.filter(s => s.gender === 'Girl'));

            const select = document.getElementById('log-student-select');
            const currentSelection = select.value;
            select.innerHTML = '<option value="">Select your name...</option>' + 
                students.sort((a,b) => a.name.localeCompare(b.name)).map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            select.value = currentSelection;

            document.getElementById('admin-count-badge').innerText = `${students.length} Students`;
            document.getElementById('admin-student-list').innerHTML = students.map(s => `
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${s.name}</p>
                        <p class="text-xs text-gray-400 uppercase">${s.gender}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-blue-600">${s.total}</span>
                        ${isTeacherMode ? `<button onclick="deleteStudent('${s.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderLeaderboard(id, list) {
            const sorted = list.sort((a,b) => (b.total || 0) - (a.total || 0));
            document.getElementById(id).innerHTML = sorted.map((s, idx) => `
                <div class="flex items-center justify-between p-3 border-b border-gray-50 last:border-0">
                    <div class="flex items-center gap-3">
                        <span class="w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold ${idx === 0 ? 'bg-yellow-400 text-white' : 'bg-gray-100'}">${idx + 1}</span>
                        <span class="font-medium">${s.name}</span>
                    </div>
                    <span class="font-bold text-blue-600">${s.total}</span>
                </div>
            `).join('');
        }

        function showNotification(text) {
            const el = document.getElementById('notification');
            document.getElementById('notification-text').innerText = text;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        init();
    </script>
</body>
</html>
